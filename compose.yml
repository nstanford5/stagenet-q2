# Local proof server only. The node + indexer are remote (stagenet/preview/
# preprod); on `local` you also need a devnet node+indexer on 9944/8088 — this
# harness is oriented at remote networks, so only the proof server is defined.
services:
  proof-server:
    image: 'midnightntwrk/proof-server:9.0.0-rc.5_experimental'
    command: ['midnight-proof-server', '-v']
    ports:
      - '127.0.0.1:6300:6300'
    environment:
      RUST_BACKTRACE: 'full'
    healthcheck:
      test: ['CMD-SHELL', 'echo > /dev/tcp/127.0.0.1/6300']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
